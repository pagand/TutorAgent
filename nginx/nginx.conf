worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Increased timeouts for LLM inference (can take 30–60 s)
    proxy_read_timeout  120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout  120s;

    upstream api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # --- API proxy ---
        location / {
            proxy_pass         http://api;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # SSE / streaming support (chat endpoint)
            proxy_buffering    off;
            proxy_cache        off;
        }

        # --- Health check (used by load balancer / ELB) ---
        location /health {
            proxy_pass http://api/;
            access_log off;
        }

        # --- SSL placeholder ---
        # To enable HTTPS:
        # 1. Obtain certs (e.g. via certbot or ACM)
        # 2. Uncomment and populate the ssl server block below
        # 3. Change `listen 80` above to redirect → 443

        # server {
        #     listen 443 ssl;
        #     server_name your.domain.com;
        #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
        #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
        #     ssl_protocols       TLSv1.2 TLSv1.3;
        #     ssl_ciphers         HIGH:!aNULL:!MD5;
        #     location / { proxy_pass http://api; ... }
        # }
    }
}
